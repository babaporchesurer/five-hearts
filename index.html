<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Five Hearts: Karanlık Şehir</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            background: #000; color: #fff;
            font-family: 'Courier New', monospace;
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100vh; height: 100dvh;
        }

        #game-container {
            width: 100%; height: 100vh; height: 100dvh;
            background: url('sehir.jpg') no-repeat center bottom;
            background-size: cover; display: flex; flex-direction: column;
            justify-content: flex-end; position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-effect { animation: shake 0.5s; }

        #start-overlay {
            background: #000; z-index: 200; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 30px; text-align: center; color: #fff;
        }

        #drop-zehra {
            width: 180px; height: 180px; border-radius: 50%;
            border: 4px dashed #ff4b2b; overflow: hidden;
            display: flex; justify-content: center; align-items: flex-start;
            background: #111;
        }

        #drop-zehra img { width: 100%; height: auto; object-fit: cover; margin-top: 5px; }

        #drag-cicek {
            width: 100px; height: 100px; cursor: grab;
            position: relative; z-index: 210; 
            touch-action: none; -webkit-user-drag: none; user-select: none;
            will-change: transform;
        }

        #visual-area { flex: 1; position: relative; overflow: hidden; touch-action: none; }

        #char-frame {
            position: absolute; bottom: 10px; left: 20px; width: 100px; height: 140px;
            border-left: 4px solid #ff4b2b;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: none; justify-content: center; align-items: flex-end; z-index: 10;
            transition: all 0.3s ease;
        }

        .char-focus { filter: drop-shadow(0 0 10px #ff4b2b) brightness(1.2); transform: scale(1.1); }
        #char-img { height: 90%; width: auto; object-fit: contain; animation: breathe 3s ease-in-out infinite; }

        @keyframes breathe { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #dialogue-box {
            background: linear-gradient(to top, #000 80%, rgba(0,0,0,0.8));
            border-top: 2px solid rgba(255,75,43,0.5); padding: 20px;
            min-height: 180px; z-index: 15; display: flex; flex-direction: column;
        }

        #char-name { color: #ff4b2b; font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
        #main-text { font-size: 1em; line-height: 1.4; color: #ddd; flex: 1; min-height: 60px; white-space: pre-wrap; }

        .choices { display: flex; gap: 10px; margin-top: 15px; }

        button {
            background: transparent; color: #fff; border: 1px solid #ff4b2b;
            padding: 12px; cursor: pointer; flex: 1;
            font-family: 'Courier New', monospace; font-size: 0.9em;
        }

        .fullscreen-overlay {
            background: #000; z-index: 100; display: none; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            justify-content: center; align-items: center; flex-direction: column;
        }

        #death-screen { color: #ff0000; }
        #win-screen { color: #fff; }
        @keyframes beat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="start-overlay">
    <div id="drop-zehra"><img src="zehra.png" alt="Zehra"></div>
    <div id="overlay-instruction" style="color:#ff4b2b; animation: breathe 2s infinite;">başlamak için çiçeği zehra'ya sürükle</div>
    <img src="cicek.png" id="drag-cicek" alt="Çiçek" draggable="false">
</div>

<div id="game-container">
    <div id="death-screen" class="fullscreen-overlay">
        <h1>ZEHRA SENİ YEDİ</h1>
        <button onclick="resetGame()" style="max-width: 140px; padding: 40px; font-size: 0.75em; margin-top: 15px; line-height: 40px;">TEKRAR DENE</button>
    </div>

    <div id="win-screen" class="fullscreen-overlay">
        <h1>MUTLU SON</h1>
        <p style="color: #ff4b2b; animation: beat 1s infinite;">beni affet ❤️</p>
        <button onclick="resetGame()" style="max-width: 140px; padding: 40px; font-size: 0.75em; margin-top: 15px line-height: 40px;;">BAŞTAN</button>
    </div>

    <div id="visual-area"><div id="char-frame"><img id="char-img" src="" alt=""></div></div>

    <div id="dialogue-box">
        <div id="char-name"></div>
        <p id="main-text"></p>
        <div id="options" class="choices"></div>
    </div>
</div>

<script>
    const imgs = { "Ayşe": "ayse.png", "Ayse": "ayse.png", "Zehra": "zehra.png", "Kahraman": "kahraman.png" };
    const data = {
        start: { char: "Ayşe", text: "Zehra... Seni Kahraman'la rüyamda gördüm. Bir çocuğunuz vardı ve çok mutluydunuz Bence ona bir şans ver.", opts: [{ t: "Kabul Et", n: "death" }, { t: "Ayşe'yi Süründür", n: "step2" }] },
        death: { death: true },
        step2: { char: "Zehra", text: "Madem bu kadar eminsin, istek atarsa bakarız... (O akşam...)", opts: [{ t: "Mesajı Oku", n: "step3" }] },
        step3: { char: "Zehra", text: "mesajı okur 'artık benimsin geçmiş olsun(kahraman söyler) ' .", opts: [{ t: "süründür", n: "step4" }, { t: "kabul et", n: "death" }] },
        step4: { char: "Zehra", text: "mesaj yazar ya 'PUHAHAHAHAHA' .", opts: [{ t: "Onun ol", n: "step5" }] },
        step5: { char: "Kahraman", text: " biz bu kızla nasıl görüntülü konuşsak  .", opts: [{ t: "gizlice dinle", n: "step6" }] },
        step6: { char: "Kahraman", text: "ayşe ile konuşmam lazım .", opts: [{ t: "dinlemeye devam et", n: "step7" }] },
        step7: { char: "Ayse", text: "ALO' .", opts: [{ t: "hmm nolcak acaaba", n: "step8" }] },
        step8: { char: "Kahraman", text: "alo.", opts: [{ t: "dinlemeye devam ", n: "step9" }] },
        step9: { char: "Kahraman", text: "sana işim düştü .", opts: [{ t: "...", n: "step10" }] },
        step10: { char: "Ayse", text: "HAYIRDIR!!!! .", opts: [{ t: "...", n: "step11" }] },
        step11: { char: "Kahraman", text: "beni zehrayla görüntülü konuşturman lazım.", opts: [{ t: "...", n: "step12" }] },
        step12: { char: "Ayse", text: "ben hallederim sıkma canını", opts: [{ t: "...", n: "step13" }] },
        step13: { char: "Kahraman", text: "sana güveniyorumm", opts: [{ t: "yarına geç", n: "step14" }] },
        step14: { char: "anybody", text: "ayşeyle zehra okulda buluşurlar .", opts: [{ t: "kahramanı ara", n: "step15" }] },
        step15: { char: "Zehra", text: "hadi kahramanı arayalımm", opts: [{ t: "ara", n: "step16" }] },
        step16: { char: "Ayse", text: "hadi arayalım", opts: [{ t: "arama başlatır", n: "step17" }] },
        step17: { char: "anybody", text: "kahramanı ararlar", opts: [{ t: "alo", n: "step18" }, { t: "yüzüne kapat", n: "death" }] },
        step18: { char: "Zehra", text: "aloooo", opts: [{ t: "...", n: "step19" }] },
        step19: { char: "Kahraman", text: "aloo", opts: [{ t: "dinle", n: "step20" }] },
        step20: { char: "Kahraman", text: "ayşe bana bir sözün vardıı vakti geldi sanki", opts: [{ t: "şaşırmış gibi yap", n: "step21" }, { t: "zaten bildiğini söyle", n: "death" }] },
        step21: { char: "Zehra", text: "ne sözü ayşe ", opts: [{ t: "?", n: "step22" }] },
        step22: { char: "Ayşe", text: "görüntülü arayacağım", opts: [{ t: "süründür(kahramanı)", n: "step23" }, { t: "kabul et", n: "death" }] },
        step23: { char: "Zehra", text: "HAYIR ÇİNGENLERE BENZİORUM AMK .", opts: [{ t: "kolpa kadınsın", n: "step24" }] },
        step24: { char: "Kahraman", text: "HAYIR ben seni her halinle seviyoum ve arıyorum beklee", opts: [{ t: "ARAMA", n: "step25" }, { t: "ARA", n: "death" }] },
        step25: { char: "Zehra", text: "İNTERNETİM YOK (BAHANE)", opts: [{ t: "üzüldü kahraman", n: "step26" }] },
        step26: { char: "Kahraman", text: "öyle olsun", opts: [{ t: "...", n: "step27" }] },
        step27: { char: "ANYBODY", text: "SONRAKİ AKŞAM", opts: [{ t: "...", n: "step28" }] },
        step28: { char: "Kahraman", text: "zehra üzgünüm ama sebepsiz ayrılmamız lazım", opts: [{ t: "neden amk", n: "step29" }, { t: "ayrıl", n: "death" }] },
        step29: { char: "Kahraman", text: "Seni korumak için her şeyi yaparım. ama senin iyliğin için sebepsiz ayrılmamız gerek.", opts: [{ t: "vazgeçme", n: "step30" },{ t: "vazgeç", n: "death" }] },
        step30: { char: "Zehra", text: "'Neler olduğunu anlatacaksın Kahraman!' Onu köşeye sıkıştırdın.", opts: [{ t: "Dinle", n: "step31" }] },
        step31: { char: "Kahraman", text: "Bak ailevi sorunlar çıktı ama yanılmışım! ", opts: [{ t: "Dinle", n: "step32" }] },
        step32: { char: "Kahraman", text: "Özür dilerim. Seni kaybetmekten korktum ama yanılmışım. Beni affedebilir misin?", opts: [{ t: "Affet ❤️", n: "happy" }, { t: "Reddet", n: "death" }] },
        happy: { win: true }
    };

    let typingTimer, isTyping = false, currentText = "";
    
    const bgMusic = new Audio('muzik.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.3;

    window.addEventListener('mousedown', () => { bgMusic.play().catch(()=>{}); }, {once:true});
    window.addEventListener('touchstart', () => { bgMusic.play().catch(()=>{}); }, {once:true});

    function playTypeSound() {
        const sound = new Audio('daktilo.mp3'); sound.volume = 0.4;
        sound.play().catch(() => {});
    }

    function triggerShake() {
        const container = document.getElementById('game-container');
        container.classList.add('shake-effect');
        setTimeout(() => container.classList.remove('shake-effect'), 500);
    }

    function resetGame() {
        document.getElementById('death-screen').style.display = 'none';
        document.getElementById('win-screen').style.display = 'none';
        document.getElementById('start-overlay').style.display = 'flex';
        xOffset = 0; yOffset = 0;
        cicek.style.transform = "translate3d(0, 0, 0)";
        isTyping = false;
        clearTimeout(typingTimer);
    }

    document.getElementById('game-container').addEventListener('click', function() {
        if (isTyping) {
            clearTimeout(typingTimer);
            document.getElementById('main-text').innerText = currentText;
            document.getElementById('options').style.display = "flex";
            isTyping = false;
        }
    });

    const cicek = document.getElementById('drag-cicek');
    const zehraTarget = document.getElementById('drop-zehra');
    let active = false, currentX = 0, currentY = 0, initialX = 0, initialY = 0, xOffset = 0, yOffset = 0;

    cicek.addEventListener("touchstart", dragStart, {passive: false});
    document.addEventListener("touchend", dragEnd, {passive: false});
    document.addEventListener("touchmove", drag, {passive: false});
    cicek.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);

    function dragStart(e) {
        if (e.type === "touchstart") { initialX = e.touches[0].clientX - xOffset; initialY = e.touches[0].clientY - yOffset; }
        else { initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; }
        if (e.target === cicek) active = true;
    }

    function dragEnd() {
        if (!active) return;
        active = false;
        const zehraRect = zehraTarget.getBoundingClientRect();
        const cicekRect = cicek.getBoundingClientRect();
        if (cicekRect.left < zehraRect.right && cicekRect.right > zehraRect.left && cicekRect.top < zehraRect.bottom && cicekRect.bottom > zehraRect.top) {
            startGame();
        } else {
            xOffset = 0; yOffset = 0; 
            cicek.style.transition = "transform 0.3s ease-out";
            cicek.style.transform = "translate3d(0, 0, 0)";
            setTimeout(() => { cicek.style.transition = "none"; }, 300);
        }
    }

    function drag(e) {
        if (active) {
            e.preventDefault();
            if (e.type === "touchmove") { currentX = e.touches[0].clientX - initialX; currentY = e.touches[0].clientY - initialY; }
            else { currentX = e.clientX - initialX; currentY = e.clientY - initialY; }
            xOffset = currentX; yOffset = currentY;
            cicek.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        }
    }

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        bgMusic.play().catch(() => {});
        render('start');
    }

    function render(key) {
        const s = data[key];
        if (!s) return;
        if (s.death) { triggerShake(); document.getElementById('death-screen').style.display = 'flex'; return; }
        if (s.win) { document.getElementById('win-screen').style.display = 'flex'; return; }

        const frame = document.getElementById('char-frame');
        const charLower = (s.char || "").toLowerCase();

        if (charLower === "anybody" || !imgs[s.char]) {
            frame.style.display = 'none';
        } else {
            document.getElementById('char-img').src = imgs[s.char];
            frame.style.display = 'flex';
            frame.classList.add('char-focus');
        }

        document.getElementById('char-name').innerText = (charLower === "anybody") ? "" : s.char;
        const textElement = document.getElementById('main-text');
        const optCont = document.getElementById('options');
        textElement.innerText = ""; optCont.style.display = "none";
        clearTimeout(typingTimer);
        currentText = s.text; let i = 0; isTyping = true;

        function typeWriter() {
            if (i < s.text.length) {
                textElement.innerText += s.text.charAt(i);
                if (s.text.charAt(i) !== " " && i % 2 === 0) playTypeSound();
                i++; typingTimer = setTimeout(typeWriter, 100);
            } else { optCont.style.display = "flex"; isTyping = false; }
        }
        typeWriter();

        optCont.innerHTML = '';
        (s.opts || []).forEach(o => {
            const b = document.createElement('button'); b.innerText = o.t;
            b.onclick = (e) => { e.stopPropagation(); render(o.n); };
            optCont.appendChild(b);
        });
    }
</script>
</body>
</html>
